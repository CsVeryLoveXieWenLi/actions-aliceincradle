name: Install Chromium Test

on: 
  push:
    branches: [ "main" ]
  workflow_dispatch: # 允许手动触发

jobs:
  check-chromium:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update apt and install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Verify Installation and Rendering
        run: |
          # 检查版本
          chromium-browser --version
          # 尝试抓取网页内容（验证渲染引擎）
          chromium-browser --headless --no-sandbox --disable-gpu --dump-dom https://www.google.com | head -n 10
