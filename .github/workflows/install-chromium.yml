name: Install Chromium Test

on: 
  push:
    branches: [ "main" ]
  workflow_dispatch: # 允许手动触发

jobs:
  check-chromium:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update apt and install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Verify Installation
        run: |
          # 这是检测安装是否成功的命令
          chromium-browser --version
